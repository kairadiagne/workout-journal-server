services:
  api:
    build:
      context: .
      dockerfile: ./apps/workout-journal-api/Dockerfile.dev
    image: workout-journal-api:latest
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-workout}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-workout}
      - POSTGRES_DB=${POSTGRES_DB:-workout_journal}
    volumes:
      - ./apps/workout-journal-api:/usr/src/app/apps/workout-journal-api
      - ./libs:/usr/src/app/libs
    depends_on:
      - postgres

  admin:
    build:
      context: .
      dockerfile: ./apps/workout-journal-admin/Dockerfile.dev
    image: workout-journal-admin:latest
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
      - PORT=3001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-workout}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-workout}
      - POSTGRES_DB=${POSTGRES_DB:-workout_journal}
    volumes:
      - ./apps/workout-journal-admin:/usr/src/app/apps/workout-journal-admin
      - ./libs:/usr/src/app/libs
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: workout-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-workout}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-workout}
      - POSTGRES_DB=${POSTGRES_DB:-workout_journal}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
